<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typst Docs Dashboard</title>
    <style>
        :root {
            --header-bg: #222;
            --header-text: #aaa;
            --border-color: #444;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden; /* Prevent body scroll, let iframes scroll */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* The Main Layout Grid */
        .split-view {
            display: grid;
            width: 100vw;
            height: 100vh;
            /* Default: Side by Side (50% 50%) */
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 100%;
        }

        .pane {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            position: relative;
        }

        /* The Header Bar (Filename / Link) */
        .pane-header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 10px 15px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px; /* Fixed header height */
            box-sizing: border-box;
        }

        .pane-header a {
            color: #4db6ac; /* Link color */
            text-decoration: none;
            font-weight: bold;
        }

        .pane-header a:hover {
            text-decoration: underline;
        }

        /* The PDF Embed */
        iframe {
            width: 100%;
            height: 100%; /* Takes remaining space */
            border: none;
            flex-grow: 1;
        }

        /* Mobile / Portrait Mode: Stack Vertically */
        @media (max-aspect-ratio: 1/1) {
            .split-view {
                grid-template-columns: 100%;
                grid-template-rows: 1fr 1fr; /* Top and Bottom */
            }
            
            .pane {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
        }
    </style>
</head>
<body>

    <div class="split-view">
        
        <div class="pane">
            <div class="pane-header">
                <span>📄 report.pdf</span>
                <a href="main/report.pdf" target="_blank">Open / Download ↗</a>
            </div>
            <iframe src="main/report.pdf" title="Report PDF"></iframe>
        </div>

        <div class="pane">
            <div class="pane-header">
                <span>📊 slides.pdf</span>
                <a href="main/slides.pdf" target="_blank">Open / Download ↗</a>
            </div>
            <iframe src="main/slides.pdf" title="Slides PDF"></iframe>
        </div>

    </div>

</body>
</html>
